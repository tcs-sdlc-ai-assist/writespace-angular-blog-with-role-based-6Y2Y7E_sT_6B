<div class="login-page">
  <div class="login-container">
    <div class="login-card card">
      <div class="card-body login-card-body">
        <div class="login-header">
          <span class="login-icon">✍️</span>
          <h1 class="login-title">Welcome Back</h1>
          <p class="login-subtitle">Sign in to your WriteSpace account</p>
        </div>

        <div
          *ngIf="errorMessage"
          class="login-error"
          role="alert"
        >
          <span class="login-error-icon">⚠️</span>
          <span>{{ errorMessage }}</span>
        </div>

        <form
          [formGroup]="loginForm"
          (ngSubmit)="onSubmit()"
          class="login-form"
          novalidate
        >
          <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input
              id="username"
              type="text"
              class="form-input"
              [class.is-error]="isFieldInvalid('username')"
              formControlName="username"
              placeholder="Enter your username"
              autocomplete="username"
            />
            <span
              *ngIf="isFieldInvalid('username')"
              class="form-error"
            >
              Username is required.
            </span>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input
              id="password"
              type="password"
              class="form-input"
              [class.is-error]="isFieldInvalid('password')"
              formControlName="password"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
            <span
              *ngIf="isFieldInvalid('password')"
              class="form-error"
            >
              Password is required.
            </span>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-block btn-lg"
            [disabled]="isSubmitting"
          >
            {{ isSubmitting ? 'Signing in...' : 'Sign In' }}
          </button>
        </form>

        <div class="login-footer">
          <p class="login-footer-text">
            Don't have an account?
            <a routerLink="/register" class="login-footer-link">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
